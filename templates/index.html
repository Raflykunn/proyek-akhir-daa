<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Rekomendasi Laptop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa; /* Off-white premium background */
            color: #171717; /* High contrast text, not pure black */
        }
        
        /* Clean Flat Design - 1px borders, no muddy shadows */
        .card-flat {
            background-color: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 0.5rem; /* rounded-md */
        }
        
        .input-flat {
            background-color: #fafafa;
            border: 1px solid #d4d4d4;
            border-radius: 0.375rem; /* rounded-md */
            color: #171717;
            transition: all 200ms ease-out;
        }
        
        .input-flat:focus {
            outline: none;
            border-color: #171717; /* Solid black accent on focus */
            background-color: #ffffff;
        }

        .btn-solid {
            background-color: #171717;
            color: #ffffff;
            border-radius: 0.375rem;
            transition: all 200ms ease-out;
            font-weight: 500;
        }

        .btn-solid:hover {
            background-color: #404040;
        }

        .tag-subtle {
            background-color: #f5f5f5;
            border: 1px solid #e5e5e5;
            color: #525252;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12 flex flex-col items-center">
    
    <!-- Header: Clean Typography, generous spacing -->
    <header class="w-full max-w-5xl mb-16 mt-8">
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-neutral-900 mb-4">
            Rekomendasi Laptop.
        </h1>
        <p class="text-neutral-500 text-lg leading-relaxed max-w-2xl">
            Perbandingan algoritma pencarian optimalisasi budget menggunakan Dynamic Programming (0/1 Knapsack) dan pendekatan Greedy.
        </p>
    </header>

    <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-10">
        
        <!-- Input Form (Flat Design) -->
        <div class="lg:col-span-4 card-flat p-8 h-fit">
            <h2 class="text-xl font-semibold mb-6 tracking-tight text-neutral-900">Kriteria Spesifikasi</h2>
            <form id="recForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-neutral-600 mb-2">Budget Maksimal (Rp)</label>
                    <input type="number" id="budget" required class="w-full input-flat px-4 py-2.5" placeholder="Contoh: 10000000">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-neutral-600 mb-2">Min. RAM (GB)</label>
                        <input type="number" id="min_ram" required class="w-full input-flat px-4 py-2.5" placeholder="8">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-neutral-600 mb-2">Min. SSD (GB)</label>
                        <input type="number" id="min_ssd" required class="w-full input-flat px-4 py-2.5" placeholder="512">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-neutral-600 mb-2">Keyword CPU <span class="text-neutral-400 font-normal">(Opsional)</span></label>
                    <input type="text" id="cari_cpu" class="w-full input-flat px-4 py-2.5" placeholder="Contoh: Ryzen">
                </div>
                
                <button type="submit" class="w-full btn-solid py-3 px-4 mt-2">
                    Cari Rekomendasi
                </button>
            </form>
        </div>

        <!-- Results Area -->
        <div class="lg:col-span-8 flex flex-col">
            
            <!-- Loading Indicator -->
            <div id="loading" class="hidden flex justify-center items-center py-24">
                <span class="text-neutral-500 font-medium tracking-wide">Memproses algoritma...</span>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="card-flat p-12 text-center h-full flex flex-col justify-center items-center">
                <h3 class="text-lg font-medium text-neutral-900 mb-2">Belum Ada Pencarian</h3>
                <p class="text-neutral-500 text-sm">Silakan masukkan kriteria di panel sebelah kiri.</p>
            </div>

            <!-- Results Grid -->
            <div id="resultsGrid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                
                <!-- DP Result Card -->
                <div class="card-flat p-8 relative hover:border-neutral-400 transition-all duration-200 ease-out">
                    <div class="mb-8">
                        <span class="tag-subtle">Dynamic Programming</span>
                    </div>
                    <div id="dp_content" class="space-y-6">
                        <!-- Injected via JS -->
                    </div>
                </div>

                <!-- Greedy Result Card -->
                <div class="card-flat p-8 relative hover:border-neutral-400 transition-all duration-200 ease-out">
                    <div class="mb-8">
                        <span class="tag-subtle">Greedy Algorithm</span>
                    </div>
                    <div id="greedy_content" class="space-y-6">
                        <!-- Injected via JS -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.getElementById('recForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const budget = document.getElementById('budget').value;
            const min_ram = document.getElementById('min_ram').value;
            const min_ssd = document.getElementById('min_ssd').value;
            const cari_cpu = document.getElementById('cari_cpu').value;

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultsGrid').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            try {
                const response = await fetch('/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ budget, min_ram, min_ssd, cari_cpu })
                });

                const data = await response.json();
                
                renderResult('dp', data.dp);
                renderResult('greedy', data.greedy);

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('resultsGrid').classList.remove('hidden');
                
            } catch (error) {
                console.error("Error:", error);
                alert("Terjadi kesalahan saat menghubungi server.");
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        });

        function formatRupiah(number) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        }

        function renderResult(type, data) {
            const container = document.getElementById(`${type}_content`);

            if (!data.rekomendasi) {
                container.innerHTML = `
                    <div class="py-6 text-center border border-dashed border-neutral-300 rounded-md">
                        <p class="text-neutral-500 text-sm">Tidak ada laptop sesuai kriteria.</p>
                        <p class="text-neutral-400 text-xs mt-2">Waktu: ${data.waktu_eksekusi.toFixed(2)} ms</p>
                    </div>`;
                return;
            }

            const laptop = data.rekomendasi;
            const budget = parseInt(document.getElementById('budget').value);
            const sisa = budget - laptop.harga;

            container.innerHTML = `
                <div>
                    <h4 class="text-xl font-bold text-neutral-900 mb-1 tracking-tight leading-snug">${laptop.nama}</h4>
                    <div class="text-lg font-medium text-neutral-600">${formatRupiah(laptop.harga)}</div>
                </div>
                
                <div class="border-t border-b border-neutral-200 py-4 space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-neutral-500 text-sm">Sisa Budget</span>
                        <span class="text-neutral-900 text-sm font-medium">${formatRupiah(sisa)}</span>
                    </div>
                    <div class="flex justify-between items-start">
                        <span class="text-neutral-500 text-sm">Processor</span>
                        <span class="text-neutral-900 text-sm font-medium text-right max-w-[65%]">${laptop.cpu}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-neutral-500 text-sm">RAM</span>
                        <span class="text-neutral-900 text-sm font-medium">${laptop.ram} GB</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-neutral-500 text-sm">Storage</span>
                        <span class="text-neutral-900 text-sm font-medium">${laptop.ssd} GB</span>
                    </div>
                </div>

                <div class="flex justify-between items-center pt-2">
                    <span class="text-neutral-500 text-sm">Skor Utilitas</span>
                    <span class="text-neutral-900 font-bold text-lg">${laptop.skor}</span>
                </div>

                <div class="mt-6 p-3 bg-neutral-50 rounded-md border border-neutral-200 flex justify-between items-center">
                    <span class="text-neutral-500 text-xs uppercase tracking-wider font-semibold">Waktu Eksekusi</span>
                    <span class="font-mono text-neutral-900 text-sm font-medium">${data.waktu_eksekusi.toFixed(2)} ms</span>
                </div>
            `;
        }
    </script>
</body>
</html>
